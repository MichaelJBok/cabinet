<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="#2a1a05"/>

  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>

  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#3d2510" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1a0f03" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="liquidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c0622a"/>
      <stop offset="100%" stop-color="#8b3a10"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f5e6c8" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8c87a" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#f0d890" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e8c87a" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Rocks glass body (trapezoid) -->
  <!-- Glass outline -->
  <path d="M158 170 L354 170 L320 360 L192 360 Z" fill="url(#glassGrad)" stroke="url(#rimGrad)" stroke-width="6" stroke-linejoin="round"/>

  <!-- Liquid fill (bourbon/negroni color) -->
  <path d="M167 230 L345 230 L320 360 L192 360 Z" fill="url(#liquidGrad)" opacity="0.92"/>

  <!-- Ice cube 1 -->
  <rect x="210" y="250" width="52" height="52" rx="8" fill="#d4eef8" opacity="0.35" transform="rotate(-8 236 276)"/>
  <!-- Ice cube 2 -->
  <rect x="268" y="262" width="44" height="44" rx="7" fill="#d4eef8" opacity="0.28" transform="rotate(6 290 284)"/>

  <!-- Glass shine left -->
  <path d="M175 178 L188 178 L196 340 L183 340 Z" fill="white" opacity="0.07" rx="3"/>

  <!-- Rim highlight -->
  <path d="M158 170 L354 170" stroke="url(#rimGrad)" stroke-width="7" stroke-linecap="round"/>

  <!-- Orange peel garnish on rim -->
  <!-- Peel curl -->
  <path d="M308 155 Q340 130 355 155 Q365 170 345 172" fill="none" stroke="#e8852a" stroke-width="9" stroke-linecap="round"/>
  <path d="M310 156 Q342 132 356 156 Q365 170 345 172" fill="none" stroke="#f5a94a" stroke-width="5" stroke-linecap="round"/>

  <!-- Cocktail pick / stirrer -->
  <line x1="256" y1="145" x2="275" y2="355" stroke="#c8a46a" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <!-- Pick top gem -->
  <circle cx="256" cy="140" r="10" fill="#c0622a"/>
  <circle cx="256" cy="140" r="6" fill="#e8852a"/>

</svg>
